<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>  الجمبا</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background:#f2f4f7;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* الهيدر */
header {
  width:100%;
  background:#1a73e8;
  color:white;
  padding:15px;
  font-size:20px;
  text-align:center;
}

/* المستخدمين في الأعلى */
#user-list {
  width:100%;
  background:white;
  padding:10px;
  display:flex;
  gap:10px;
  overflow-x:auto;
  border-bottom:1px solid #ddd;
}

#user-list h3 {
  margin:0 10px;
  display:flex;
  align-items:center;
}

#user-list button {
  padding:8px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:#e4e6eb;
  white-space:nowrap;
}

#user-list button:hover {
  background:#cfd3d8;
}

/* لوحة الدردشة */
.chat-panel {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:15px;
}

/* عنوان الدردشة */
#chat-header {
  font-size:18px;
  margin-bottom:10px;
}

/* الرسائل */
#messages {
  flex:1;
  overflow-y:auto;
  background:white;
  border-radius:10px;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:5px;
  font-size:16px;
}

/* شكل الرسائل */
.my {
  background:#0084ff;
  color:white;
  padding:8px 14px;
  border-radius:18px;
  align-self:flex-end;
  max-width:70%;
}

.other {
  background:#4caf50;
  color:white;
  padding:8px 14px;
  border-radius:18px;
  align-self:flex-start;
  max-width:70%;
}

/* منطقة الإدخال */
.input-area {
  display:flex;
  padding:10px;
  background:white;
  border-top:1px solid #ddd;
}

#msg {
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #ccc;
  font-size:15px;
}

#send {
  margin-left:10px;
  padding:10px 20px;
  border:none;
  border-radius:25px;
  background:#1a73e8;
  color:white;
  cursor:pointer;
}

#send:hover {
  background:#1557b0;
}
  /* إشعار مرئي */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #1a73e8;
  color: white;
  padding: 12px 18px;
  border-radius: 8px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  font-size: 14px;
  opacity: 0;
  transform: translateY(-20px);
  transition: all 0.3s ease;
  z-index: 9999;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}
.unread-badge {
  color: red;
  font-weight: bold;
}
#loginScreen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#075e54,#128c7e);
  display:none; /* ← مهم */
  justify-content:center;
  align-items:center;
  z-index:9999;
}

</style>
</head>

<body>

<header>دردشة الجمبا </header>
<div id="loginScreen">
  <div class="loginBox">
    <h2>مرحباً بك 👋</h2>
    <h2> </h2>
    <h2> 

رمضان كريم
      تصوموا وتفطروا على خير
نرجو اعادة تسجيل الدخول 
      نسبة لبعض التحديثات على التطبيق
كما نرحب بالاصدقاء الجدد
      
   مع فائق  الاحترام والتقدير
* علاء الدين آدم* </h2>
     <h2> </h2>
    <p>اكتب اسمك للدخول إلى الشات</p>
    <input type="text" id="usernameInput" placeholder="اسمك">
    <button onclick="registerUser()">دخول</button>
  </div>
</div>
<!-- المستخدمين بالأعلى -->
<div id="user-list"></div>

<!-- الدردشة بالأسفل أكبر -->
<div class="chat-panel">
  <h3 id="chat-header">اختر مستخدم لبدء المحادثة</h3>
  <div id="messages"></div>
  <div class="input-area">
    <input id="msg" placeholder="اكتب رسالة..." />
    <button id="send">إرسال</button>
  </div>
</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
 "https://vmsvmvetlpszsmqigonp.supabase.co",
  "sb_publishable_4sCsIFqPbKbfCY66CsXuzA_hgOFLWO0"
);

let me = null;
let chatId = null;
let channel = null;

  async function registerUser() {

  let name = document.getElementById("usernameInput").value.trim();

  if (!name) {
    alert("اكتب اسمك أولاً");
    return;
  }

  const { data, error } = await supabase
    .from("users")
    .insert({ username: name })
    .select()
    .single();

  if (error) {
    alert("خطأ: " + error.message);
    console.error(error);
    return;
  }

  localStorage.setItem("uid", data.id);
  me = data;

  document.getElementById("loginScreen").style.display = "none";

  await loadUsers();
  listenMessages();
}

window.registerUser = registerUser;


/* =========================
   تسجيل المستخدم
========================= */
async function initUser() {

  let saved = localStorage.getItem("uid");

  if (!saved) {
    document.getElementById("loginScreen").style.display = "flex";
    return;
  }

  let { data } = await supabase
    .from("users")
    .select("*")
    .eq("id", saved)
    .single();

  if (data) {
    me = data;
  } else {
    document.getElementById("loginScreen").style.display = "flex";
  }
}

/* =========================
   تحميل المستخدمين
========================= */
async function loadUsers() {

  let { data: users } = await supabase
    .from("users")
    .select("*")
    .neq("id", me.id);

  let box = document.getElementById("user-list");
  box.innerHTML = "";

  for (let u of users) {

    const { count } = await supabase
      .from("messages")
      .select("*", { count: "exact", head: true })
      .eq("sender_id", u.id)
      .eq("receiver_id", me.id)
      .eq("is_read", false);

    let b = document.createElement("button");

    if (count > 0) {
      b.innerHTML = `${u.username} <span style="color:red">(${count})</span>`;
    } else {
      b.textContent = u.username;
    }

    b.onclick = () => openChat(u);

    box.appendChild(b);
  }
}

/* =========================
   فتح محادثة
========================= */
async function openChat(u) {

  let { data } = await supabase
    .from("chats")
    .select("*")
    .or(`and(user1.eq.${me.id},user2.eq.${u.id}),and(user1.eq.${u.id},user2.eq.${me.id})`)
    .single();

  if (!data) {
    let res = await supabase
      .from("chats")
      .insert({ user1: me.id, user2: u.id })
      .select()
      .single();

    data = res.data;
  }

  chatId = data.id;

  document.getElementById("chat-header").textContent = "الدردشة مع " + u.username;

  await loadMessages();

  await supabase
    .from("messages")
    .update({ is_read: true })
    .eq("chat_id", chatId)
    .eq("receiver_id", me.id);

  loadUsers();
}

/* =========================
   تحميل الرسائل
========================= */
async function loadMessages() {

  let { data } = await supabase
    .from("messages")
    .select(`
      id,
      text,
      sender_id,
      sender:sender_id ( username )
    `)
    .eq("chat_id", chatId)
    .order("created_at", { ascending: true });

  let box = document.getElementById("messages");
  box.innerHTML = "";

  data.forEach(msg => {

    let div = document.createElement("div");
    div.id = "msg-" + msg.id;

    if (msg.sender_id === me.id) {
      div.className = "my";
      div.textContent = msg.text;

      let del = document.createElement("button");
      del.textContent = "🗑";
      del.style.marginRight = "6px";
      del.onclick = async () => {
        await supabase.from("messages").delete().eq("id", msg.id);
      };

      div.appendChild(del);

    } else {
      div.className = "other";
      div.textContent = msg.sender?.username + ": " + msg.text;
    }

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

/* =========================
   الاستماع الفوري
========================= */
function listenMessages() {

  if (channel) supabase.removeChannel(channel);

  channel = supabase
    .channel("realtime-messages")

    .on(
      "postgres_changes",
      {
        event: "INSERT",
        schema: "public",
        table: "messages"
      },
      async (payload) => {

        const msg = payload.new;

        // لا تعرض رسالتي (أنا أعرضها محلياً)
        if (msg.sender_id === me.id) return;

        // لو الرسالة ليست في الشات المفتوح
        if (msg.chat_id !== chatId) {
          loadUsers();
          return;
        }

        // منع التكرار
        if (document.getElementById("msg-" + msg.id)) return;

        // جلب اسم المرسل
        const { data: user } = await supabase
          .from("users")
          .select("username")
          .eq("id", msg.sender_id)
          .single();

        let box = document.getElementById("messages");

        let div = document.createElement("div");
        div.id = "msg-" + msg.id;
        div.className = "other";
        div.textContent = user.username + ": " + msg.text;

        box.appendChild(div);
        box.scrollTop = box.scrollHeight;

        // تحديثها كمقروءة
        await supabase
          .from("messages")
          .update({ is_read: true })
          .eq("id", msg.id);

        loadUsers();
      }
    )

    .on(
      "postgres_changes",
      {
        event: "DELETE",
        schema: "public",
        table: "messages"
      },
      (payload) => {
        let el = document.getElementById("msg-" + payload.old.id);
        if (el) el.remove();
      }
    )

    .subscribe();
}


/* =========================
   إرسال رسالة
========================= */
async function sendMessage() {

  let input = document.getElementById("msg");
  let text = input.value.trim();

  if (!text || !chatId) return;

  const { data: chat } = await supabase
    .from("chats")
    .select("user1, user2")
    .eq("id", chatId)
    .single();

  let receiverId = chat.user1 === me.id ? chat.user2 : chat.user1;

  const { data } = await supabase
    .from("messages")
    .insert({
      chat_id: chatId,
      sender_id: me.id,
      receiver_id: receiverId,
      text: text,
      is_read: false
    })
    .select()
    .single();

  input.value = "";

  await loadMessages();
}

/* =========================
   ربط الأزرار
========================= */
document.getElementById("send").addEventListener("click", sendMessage);

document.getElementById("msg").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

/* =========================
   تشغيل التطبيق
========================= */
await initUser();
await loadUsers();
listenMessages();



</script>
</body>
</html>
